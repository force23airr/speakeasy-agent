services:
  postgres:
    image: postgres:16-alpine
    container_name: civic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: civic
      POSTGRES_PASSWORD: civic
      POSTGRES_DB: civic
    ports:
      - "5433:5432"
    volumes:
      - civic_pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  civic_pgdata:
